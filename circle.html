<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingkaran</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <a href="index.html" class="home-btn">
  <svg width="22" height="22" viewBox="0 0 24 24">
    <path fill="#1E3A8A" d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
  </svg>
</a>
    <h1>MATHOOLS</h1>
</header>

<div class="layout">

<div class="left">
<div class="circle" style="margin:auto"></div>
<h2 style="color:#1E3A8A;margin-top:20px">Rumus luas lingkaran</h2>
<div class="box">L = π x r²</div>
<div class="box">Nilai π : 3,14 atau 22/7<br>Variabel r : Jari-jari</div>
</div>

<div class="divider"></div>

<div class="right">
<h3 style="color:#1E3A8A">Nilai jari-jari ( r ) =</h3>
<input id="r" placeholder="Masukkan nilai r">
<button onclick="hitungLingkaran()">Hitung luas</button>

<div class="box" id="langkahL">-</div>
<div class="box result" id="hasilL">??</div>
</div>

</div>

<script>
function hitungLingkaran(){
  let input = document.getElementById('r').value.trim();

  // 1. validasi format angka
  if(!/^\d+(\.\d+)?$/.test(input)){
    alert("Masukkan angka yang valid!");
    return;
  }

  let r = parseFloat(input);

  // 2. VALIDASI TIDAK BOLEH 0 (DI SINI)
  if(r <= 0){
    alert("Nilai jari-jari harus lebih dari 0!");
    return;
  }

  let L = 3.14 * r * r;

  document.getElementById('langkahL').innerHTML =
    "1. Rumus : L = π x r²<br>" +
    "2. Substitusi : L = 3,14 x " + r + "²<br>" +
    "3. Hitung r² : L = 3,14 x " + (r*r);

  document.getElementById('hasilL').innerHTML =
    "Luas lingkaran = " + L;
}
</script>

</body>
</html>
